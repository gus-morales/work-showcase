name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - 01-delinquency-risk-model
          - 02-ltv-contribution-analysis
          - 03-growth-experimentation-segmentation
          - 04-llm-eval-monitoring
          - 05-fraud-anomaly-detection
          - 06-equipment-failure-risk
          - 07-ds-decision-governance
          - 08-observatory
    defaults:
      run:
        working-directory: projects/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: projects/${{ matrix.project }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      - name: Lint (src and tests, all projects)
        run: ruff check projects/*/src projects/*/tests
